services:
  webhookservice:
    build:
      context: ./basedonsapcommerce
      dockerfile: Dockerfile
    container_name: webhookservice
    ports:
      - "5004:5004"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - app-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_local
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Admin123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Admin123!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # volumes:
    #   - sqlserver_data_new:/var/opt/mssql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  sqlserver_data_new: